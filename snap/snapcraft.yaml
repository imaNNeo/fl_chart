name: fl-chart-app
version: 1.2.0
summary: FL Chart - Interactive chart samples
description: |
  FL Chart App demonstrates the fl_chart Flutter package with interactive
  samples of line, bar, pie, scatter, radar, and candlestick charts.

confinement: strict
base: core22
grade: stable

slots:
  dbus-fl-chart-app:
    interface: dbus
    bus: session
    name: dev.flchart.app

apps:
  fl-chart-app:
    command: fLChartApp
    extensions: [gnome]
    plugs:
      - network
    slots:
      - dbus-fl-chart-app

parts:
  fl-chart-app:
    source: .
    source-subdir: example
    plugin: flutter
    flutter-target: lib/main.dart
    build-packages:
      - lld-14
    override-build: |
      # Flutter's native assets looks for ld.lld in the LLVM directory.
      # lld-14 installs it elsewhere, so create a symlink.
      if [ ! -f /usr/lib/llvm-14/bin/ld.lld ]; then
        ln -sf /usr/bin/ld.lld-14 /usr/lib/llvm-14/bin/ld.lld 2>/dev/null || \
        ln -sf /usr/bin/ld /usr/lib/llvm-14/bin/ld 2>/dev/null || true
      fi
      craftctl default
