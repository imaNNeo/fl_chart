name: fl-chart-app
version: 1.2.0
summary: FL Chart - Interactive chart samples
description: |
  FL Chart App demonstrates the fl_chart Flutter package with interactive
  samples of line, bar, pie, scatter, radar, and candlestick charts.

confinement: strict
base: core22
grade: stable

slots:
  dbus-fl-chart-app:
    interface: dbus
    bus: session
    name: dev.flchart.app

apps:
  fl-chart-app:
    command: fLChartApp
    extensions: [gnome]
    plugs:
      - network
    slots:
      - dbus-fl-chart-app

parts:
  fl-chart-app:
    source: .
    source-subdir: example
    plugin: flutter
    flutter-target: lib/main.dart
